<!DOCTYPE html>
<html>
<head>
    <title>TRIRIGA Diagnostic Blueprint</title>
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="https://dagrejs.github.io/project/dagre-d3/latest/dagre-d3.min.js"></script>
    <style type="text/css">
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #f4f6f9; }
        
        #canvas-container { 
            width: 75%; 
            height: 100%; 
            border-right: 2px solid #ccc; 
            background-color: #f8f9fa;
            background-image: radial-gradient(#d5d5d5 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative; 
            overflow: hidden; 
        }
        
        #sidepanel { width: 25%; height: 100%; padding: 20px; overflow-y: auto; background-color: #2b2b2b; color: #f1f1f1; box-sizing: border-box; }
        h2 { color: #4da6ff; font-size: 1.2em; margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        h3 { color: #ffffff; margin-bottom: 5px; }
        hr { border-color: #555; }
        .hint { color: #888; font-style: italic; margin-top: 20px; }
        
        svg { width: 100%; height: 100%; outline: none; }
        .node { cursor: pointer; }
        
        .node rect { fill: transparent !important; stroke: none !important; }
        
        .edgePath path { fill: none; }
        .edgeLabel rect { fill: #ffffff; stroke: #ccc; stroke-width: 1; rx: 3; ry: 3; }
        .edgeLabel text { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: bold; fill: #d35400; }

        .legend { position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.95); padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 12px; color: #333; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); pointer-events: none; }
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
        .legend-item:last-child { margin-bottom: 0; }
        .color-box { width: 16px; height: 16px; margin-right: 10px; border-radius: 3px; }
        
        .shape-icon { display: inline-block; width: 20px; height: 15px; margin-right: 10px; border: 1px solid #777; }
        .s-scalene { background: #00b0f0; clip-path: polygon(0 0, 100% 0, 100% 70%, 50% 100%, 0 70%); }
        .s-oval { background: #00b050; border-radius: 50%; }
        .s-pill { background: #bbf3ff; border-radius: 8px; }
        .s-query-chevron { background: #ccffcc; clip-path: polygon(0 0, 80% 0, 100% 50%, 80% 100%, 0 100%); }
        .s-rect-p { background: #ffcccc; border-radius: 2px; }
        .s-notch { background: #e6ccff; clip-path: polygon(0 0, 100% 0, 100% 20%, 80% 30%, 100% 40%, 100% 60%, 80% 70%, 100% 80%, 100% 100%, 0 100%, 0 80%, 20% 70%, 0 60%, 0 40%, 20% 30%, 0 20%); }
    </style>
</head>
<body>
    <div id="canvas-container">
        <svg id="svg-canvas"><g/></svg>
        <div class="legend">
            <div style="font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 10px; color: #666;">Routing Tracks</div>
            <div class="legend-item"><div class="color-box" style="background: #e67e22;"></div> Critical Path</div>
            <div class="legend-item"><div class="color-box" style="background: #00c3a5;"></div> Live Trace Log</div>

            <div style="font-weight: bold; margin-top: 15px; margin-bottom: 10px; text-transform: uppercase; font-size: 10px; color: #666;">TRIRIGA Task Legend</div>
            <div class="legend-item"><div class="shape-icon s-oval"></div> Start / End Task</div>
            <div class="legend-item"><div class="shape-icon s-scalene"></div> Switch (Decision Gate)</div>
            <div class="legend-item"><div class="shape-icon s-query-chevron"></div> Query Task</div>
            <div class="legend-item"><div class="shape-icon s-pill"></div> Retrieve Task</div>
            <div class="legend-item"><div class="shape-icon s-rect-p"></div> Modify Records</div>
            <div class="legend-item"><div class="shape-icon s-notch"></div> Modify Metadata</div>
        </div>
    </div>
    <div id="sidepanel">
        <h2>Diagnostics Panel</h2>
        <div id="payloadData">
            <p class="hint">Click on any Task to inspect its internal logic, database modifiers, and GUI mappings.</p>
        </div>
    </div>

    <script type="text/javascript">
        var nodesData = GRAPH_NODES_DATA_PLACEHOLDER;
        var edgesData = GRAPH_EDGES_DATA_PLACEHOLDER;
        
        window.payloads = {};

        // To prevent Dagre from crossing edges, we weight the TRUE path heavily to form a vertical trunk
        edgesData.sort(function(a, b) {
            if (a.label === "TRUE" && b.label !== "TRUE") return -1;
            if (a.label !== "TRUE" && b.label === "TRUE") return 1;
            return 0;
        });

        var g = new dagreD3.graphlib.Graph().setGraph({
            rankdir: 'TB',
            nodesep: 80,   
            edgesep: 30,
            ranksep: 60   
        });

        nodesData.forEach(function(n) {
            window.payloads[n.id] = n.customPayload;
            g.setNode(n.id, {
                labelType: "html",
                label: "<img src='" + n.image + "' width='" + n.width + "' height='" + n.height + "' style='display:block; pointer-events: none;'/>",
                padding: 0,
                width: n.width,
                height: n.height
            });
        });

        edgesData.forEach(function(e) {
            // Apply weight to ensure the primary logic path remains a straight, unbreakable column
            var weight = (e.label === "TRUE" || e.label === "") ? 100 : 1;
            g.setEdge(e.from, e.to, {
                label: e.label || "",
                style: "stroke: " + e.color + "; stroke-width: " + e.width + "px; fill: none;",
                arrowhead: "undirected", 
                weight: weight,
                source_type: e.source_type // Crucial for identifying Switch tasks in the custom SVG redraw
            });
        });

        var svg = d3.select("#svg-canvas"),
            inner = svg.select("g");

        var zoom = d3.zoom().on("zoom", function() {
            inner.attr("transform", d3.event.transform);
        });
        svg.call(zoom);

        var render = new dagreD3.render();
        render(inner, g);

        // ============================================================================
        // THE VANILLA SVG PATH OVERRIDE (Perfect Compass Intersections)
        // ============================================================================
        inner.selectAll("g.edgePath").each(function(e) {
            var edge = g.edge(e);
            var sourceNode = g.node(e.v);
            var targetNode = g.node(e.w);
            var pathElement = d3.select(this).select("path");

            var sx = sourceNode.x, sy = sourceNode.y, sw = sourceNode.width, sh = sourceNode.height;
            var tx = targetNode.x, ty = targetNode.y, tw = targetNode.width, th = targetNode.height;

            // Target is ALWAYS North (Top Center of target node)
            var endX = tx;
            var endY = ty - th/2;
            var startX, startY, pathData;

            if (edge.source_type === '14') {
                if (edge.label === "TRUE") {
                    // TRUE: Exit WEST (Left Center)
                    startX = sx - sw/2;
                    startY = sy;
                    // Draw Line: Left 30px -> Down to just above target -> Right to target X -> Down to target
                    pathData = `M ${startX},${startY} H ${startX - 30} V ${endY - 20} H ${endX} V ${endY}`;
                } else if (edge.label === "FALSE") {
                    // FALSE: Exit EAST (Right Center)
                    startX = sx + sw/2;
                    startY = sy;
                    // Draw Line: Right 30px -> Down to just above target -> Left to target X -> Down to target
                    pathData = `M ${startX},${startY} H ${startX + 30} V ${endY - 20} H ${endX} V ${endY}`;
                } else {
                    // Default Exit: SOUTH (Bottom Center)
                    startX = sx;
                    startY = sy + sh/2;
                    pathData = `M ${startX},${startY} V ${endY - 20} H ${endX} V ${endY}`;
                }
            } else {
                // All other tasks Exit SOUTH (Bottom Center)
                startX = sx;
                startY = sy + sh/2;
                pathData = `M ${startX},${startY} V ${startY + (endY - startY)/2} H ${endX} V ${endY}`;
            }

            pathElement.attr("d", pathData);
        });

        // Re-center the TRUE/FALSE labels onto the newly drawn SVG lines
        inner.selectAll("g.edgeLabel").each(function(e) {
            var edge = g.edge(e);
            var sourceNode = g.node(e.v);
            var labelGroup = d3.select(this);
            
            var sx = sourceNode.x, sy = sourceNode.y, sw = sourceNode.width;

            if (edge.source_type === '14') {
                if (edge.label === "TRUE") {
                    // Shift label to the newly drawn West branch
                    labelGroup.attr("transform", `translate(${sx - sw/2 - 15}, ${sy - 15})`);
                } else if (edge.label === "FALSE") {
                    // Shift label to the newly drawn East branch
                    labelGroup.attr("transform", `translate(${sx + sw/2 + 15}, ${sy - 15})`);
                }
            }
        });

        // Native D3 click handler intercepts correctly when pointer-events are configured
        inner.selectAll("g.node").on("click", function(id) {
            if (window.payloads[id]) {
                document.getElementById('payloadData').innerHTML = window.payloads[id];
            }
        });

        // Asynchronous Bounding Box Camera Focus
        setTimeout(function() {
            var startNodeData = nodesData.find(function(n) { return n.isStart; });
            var startId = startNodeData ? startNodeData.id : nodesData[0].id;
            var startNode = g.node(startId);
            
            var container = document.getElementById('canvas-container');
            var canvasWidth = container.clientWidth;
            var initialScale = 0.85;
            
            // X: Center the screen on the exact start node coordinates
            var tx = (canvasWidth / 2) - (startNode.x * initialScale);
            // Y: Pin the top of the start node 60 pixels from the toolbar
            var ty = 60 - (startNode.y * initialScale) + ((startNode.height * initialScale) / 2);
            
            svg.transition().duration(250).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(initialScale));
        }, 100);

    </script>
</body>
</html>
